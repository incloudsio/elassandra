# Run wave 0 (ClusterSettingsTests smoke) in a stock OpenSearch 1.3.20 clone after Elassandra sync + patches.
# See scripts/opensearch-sidecar-test-try.sh (OPENSEARCH_SIDECAR_TEST_WAVE) and server/OPENSEARCH_PORT.md.
name: Elassandra OpenSearch side-car test (manual)
on:
  workflow_dispatch:

jobs:
  sidecar-test-smoke:
    name: opensearch-sidecar :server:test (wave 0)
    runs-on: ubuntu-latest
    # Remove when wave 0 is reliably green on ubuntu-latest (embedded Config + Cassandra runtime deps).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        id: jdk11
        with:
          distribution: temurin
          java-version: "11"

      - name: Shallow clone OpenSearch 1.3.20
        run: |
          git clone --depth 1 --branch "1.3.20" https://github.com/opensearch-project/OpenSearch.git "${{ runner.temp }}/opensearch-sidecar"

      - name: Build Elassandra Cassandra jar (if missing)
        run: ./scripts/build-elassandra-cassandra-jar.sh
        working-directory: ${{ github.workspace }}

      - name: Run Elassandra sync + patches + OpenSearch :server:test (filtered)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          RUNTIME_JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          OPENSEARCH_CLONE_DIR: ${{ runner.temp }}/opensearch-sidecar
          OPENSEARCH_SIDECAR_TEST_WAVE: "0"
          # Single forked JVM: fewer Lucene mock FS / java.io.tmpdir races with Gradle test workers.
          OPENSEARCH_SIDECAR_TESTS_JVMS: "1"
        run: ./scripts/opensearch-sidecar-test-try.sh
