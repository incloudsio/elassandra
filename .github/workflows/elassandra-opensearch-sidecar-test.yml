# Run curated :server:test waves in a stock OpenSearch 1.3.20 clone after Elassandra sync + patches.
# Default wave 0 = smoke; use inputs to run waves 1–4 (see opensearch-sidecar-test-try.sh, OPENSEARCH_PORT.md).
name: Elassandra OpenSearch side-car test (manual)
on:
  workflow_dispatch:
    inputs:
      wave:
        description: "OPENSEARCH_SIDECAR_TEST_WAVE (0=smoke … 4=org.elassandra.*)"
        type: choice
        default: "0"
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"

jobs:
  sidecar-test-smoke:
    name: opensearch-sidecar :server:test (wave ${{ inputs.wave }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        id: jdk11
        with:
          distribution: temurin
          java-version: "11"

      - name: Export JAVA_HOME for Gradle (elasticsearch.build)
        run: echo "JAVA_HOME=${{ steps.jdk11.outputs.path }}" >> "$GITHUB_ENV"

      - name: Shallow clone OpenSearch 1.3.20
        run: |
          git clone --depth 1 --branch "1.3.20" https://github.com/opensearch-project/OpenSearch.git "${{ runner.temp }}/opensearch-sidecar"

      - name: Build Elassandra Cassandra jar (if missing)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
        run: ./scripts/build-elassandra-cassandra-jar.sh

      - name: Run Elassandra sync + patches + OpenSearch :server:test (filtered)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          RUNTIME_JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          OPENSEARCH_CLONE_DIR: ${{ runner.temp }}/opensearch-sidecar
          OPENSEARCH_SIDECAR_TEST_WAVE: ${{ inputs.wave }}
          # Single forked JVM: fewer Lucene mock FS / java.io.tmpdir races with Gradle test workers.
          OPENSEARCH_SIDECAR_TESTS_JVMS: "1"
        run: ./scripts/opensearch-sidecar-test-try.sh
