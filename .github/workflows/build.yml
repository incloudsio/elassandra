name: Build
on:
  push:
    branches:
      - v6.8.4-strapdata
      - modernization/cassandra4-opensearch13
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK 8
        id: jdk8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
      # Compiler minimum is Java 11 (see buildSrc/.../minimumCompilerVersion). Temurin no longer publishes JDK 12 for setup-java.
      - name: Set up JDK 11 (Gradle + JAVA11_HOME; JAVA12_HOME kept for scripts expecting the old name)
        id: jdk11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle
      - name: Export Java homes
        run: |
          echo "JAVA8_HOME=${{ steps.jdk8.outputs.path }}" >> $GITHUB_ENV
          echo "CASSANDRA_JAVA_HOME=${{ steps.jdk8.outputs.path }}" >> $GITHUB_ENV
          echo "JAVA11_HOME=${{ steps.jdk11.outputs.path }}" >> $GITHUB_ENV
          echo "JAVA12_HOME=${{ steps.jdk11.outputs.path }}" >> $GITHUB_ENV
          echo "JAVA_HOME=${{ steps.jdk11.outputs.path }}" >> $GITHUB_ENV
          # server/cassandra Ant validate-build-conf (Ant JVM = Gradle JVM = JDK 11 here)
          echo "CASSANDRA_USE_JDK11=true" >> $GITHUB_ENV
      - name: Check Cassandra version vs submodule
        run: ./scripts/check-cassandra-submodule.sh
      - name: Assemble
        run: ./gradlew assemble --info
      - name: SonarCloud (optional)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            ./gradlew sonarqube --info
          else
            echo "SONAR_TOKEN not set; skipping SonarCloud."
          fi
