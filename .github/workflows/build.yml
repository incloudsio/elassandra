name: Build
on:
  push:
    branches:
      - v6.8.4-strapdata
      - modernization/cassandra4-opensearch13
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK 8
        id: jdk8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
      - name: Set up JDK 12
        id: jdk12
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "12"
          cache: gradle
      - name: Export Java homes
        run: |
          echo "JAVA8_HOME=${{ steps.jdk8.outputs.path }}" >> $GITHUB_ENV
          echo "CASSANDRA_JAVA_HOME=${{ steps.jdk8.outputs.path }}" >> $GITHUB_ENV
          echo "JAVA12_HOME=${{ steps.jdk12.outputs.path }}" >> $GITHUB_ENV
          echo "JAVA_HOME=${{ steps.jdk12.outputs.path }}" >> $GITHUB_ENV
      - name: Check Cassandra version vs submodule
        run: ./scripts/check-cassandra-submodule.sh
      - name: Assemble
        run: ./gradlew assemble --info -x docs:build
      - name: SonarCloud (optional)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            ./gradlew sonarqube --info -x docs:build
          else
            echo "SONAR_TOKEN not set; skipping SonarCloud."
          fi
