# Optional full org.elassandra.* :server:test in the side-car (slow; exploratory).
# Uses OPENSEARCH_SIDECAR_TEST_WAVE=4; allowed to fail until the full runtime is stable.
name: Elassandra OpenSearch side-car test (full package, scheduled)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  sidecar-test-full:
    name: opensearch-sidecar :server:test (wave 4)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        id: jdk11
        with:
          distribution: temurin
          java-version: "11"

      - name: Export JAVA_HOME for Gradle (elasticsearch.build)
        run: echo "JAVA_HOME=${{ steps.jdk11.outputs.path }}" >> "$GITHUB_ENV"

      - name: Shallow clone OpenSearch 1.3.20
        run: |
          git clone --depth 1 --branch "1.3.20" https://github.com/opensearch-project/OpenSearch.git "${{ runner.temp }}/opensearch-sidecar"

      - name: Build Elassandra Cassandra jar (if missing)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
        run: ./scripts/build-elassandra-cassandra-jar.sh

      - name: Run Elassandra sync + patches + OpenSearch :server:test (org.elassandra.*)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          RUNTIME_JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          OPENSEARCH_CLONE_DIR: ${{ runner.temp }}/opensearch-sidecar
          OPENSEARCH_SIDECAR_TEST_WAVE: "4"
          OPENSEARCH_SIDECAR_TESTS_JVMS: "1"
        run: ./scripts/opensearch-sidecar-test-try.sh
