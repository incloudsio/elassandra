# Compile Elassandra org.elasticsearch.* sources synced into OpenSearch 1.3.x (see scripts/opensearch-sidecar-compile-try.sh).
name: Elassandra OpenSearch side-car compile
on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  sidecar-compile-java:
    name: opensearch-sidecar compileJava + compileTestJava (JDK 11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        id: jdk11
        with:
          distribution: temurin
          java-version: "11"

      - name: Export JAVA_HOME for Gradle (elasticsearch.build)
        run: echo "JAVA_HOME=${{ steps.jdk11.outputs.path }}" >> "$GITHUB_ENV"

      - name: Shallow clone OpenSearch 1.3.20
        run: |
          git clone --depth 1 --branch "1.3.20" https://github.com/opensearch-project/OpenSearch.git "${{ runner.temp }}/opensearch-sidecar"

      - name: Build Elassandra Cassandra jar (if missing)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
        run: ./scripts/build-elassandra-cassandra-jar.sh

      - name: Run Elassandra sync + patches + OpenSearch compile (main + tests)
        working-directory: ${{ github.workspace }}
        env:
          JAVA_HOME: ${{ steps.jdk11.outputs.path }}
          OPENSEARCH_CLONE_DIR: ${{ runner.temp }}/opensearch-sidecar
        run: ./scripts/opensearch-sidecar-compile-try.sh
