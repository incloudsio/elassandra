name: Docs
on:
  push:
    branches: [main, master, v6.8.4-strapdata]
  pull_request:

jobs:
  sphinx:
    name: Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/elassandra/requirements.txt
      - name: Install dependencies
        run: pip install -r docs/elassandra/requirements.txt
      - name: Build HTML
        run: sphinx-build -b html docs/elassandra/source docs/elassandra/build/html
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elassandra-docs-html
          path: docs/elassandra/build/html
