# Weekly / manual smoke: upstream OpenSearch 1.3.20 server compiles on Java 11.
name: OpenSearch side-car smoke
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  opensearch-upstream-compile:
    name: OpenSearch 1.3.20 :server:compileJava (Java 11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle
      - name: Shallow clone OpenSearch 1.3.20
        run: |
          git clone --depth 1 --branch 1.3.20 https://github.com/opensearch-project/OpenSearch.git "${{ runner.temp }}/opensearch-upstream"
      - name: Compile server
        working-directory: ${{ runner.temp }}/opensearch-upstream
        run: ./gradlew :server:compileJava --no-daemon
